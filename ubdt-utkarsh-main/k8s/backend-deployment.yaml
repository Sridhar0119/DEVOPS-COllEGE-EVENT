apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: default
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        # Update this image path to your ECR registry URL in the Jenkins CD pipeline
        image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/ubdt-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 4000
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        envFrom:
        - configMapRef:
            name: app-config
        env:
        - name: APPWRITE_API_KEY
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: APPWRITE_API_KEY
        - name: ADMIN_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: ADMIN_API_TOKEN
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: default
  labels:
    app: backend
spec:
  type: ClusterIP
  ports:
  - port: 4000
    targetPort: 4000
    protocol: TCP
  selector:
    app: backend
